# docker-compose.yml - Uses dynamic IP detection

services:
  # IP Detection and Configuration Init Container
  ip-config-init:
    image: alpine:latest
    container_name: nextcloud-ip-config
    volumes:
      - ./scripts:/scripts:ro
      - ./:/shared
    working_dir: /scripts
    command: sh -c "apk add --no-cache bash && bash /scripts/detect-ip.sh"
    networks:
      - nextcloud-network

  # Trusted Domains Configuration Service
  trusted-domains-config:
    image: docker:cli
    container_name: nextcloud-trusted-domains
    volumes:
      - ./scripts:/scripts:ro
      - ./:/shared
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /scripts
    command: sh -c "apk add --no-cache bash && bash /scripts/configure-trusted-domains.sh"
    depends_on:
      nextcloud-app:
        condition: service_started
    networks:
      - nextcloud-network
  nextcloud-db:
    image: postgres:13-alpine
    container_name: nextcloud-db
    restart: unless-stopped
    volumes:
      - ./database:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloudpassword
      - PGDATA=/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud -d nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextcloud-network

  redis:
    image: redis:alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    command: redis-server --requirepass redispassword
    networks:
      - nextcloud-network

  nextcloud-app:
    image: nextcloud:latest
    container_name: nextcloud-app
    restart: unless-stopped
    ports:
      # Bind to all interfaces for external access
      - "8090:80"
    volumes:
      - ./config:/var/www/html/config
      - ./data:/var/www/html/data
      - ./custom_apps:/var/www/html/custom_apps
      - ./themes:/var/www/html/themes
      - /media/Kelib/DATA2:/mnt/external_storage:rw
      - ./:/shared:ro
    environment:
      # PostgreSQL Configuration
      - POSTGRES_HOST=nextcloud-db
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloudpassword

      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_HOST_PASSWORD=redispassword

      # Nextcloud Configuration - removed auto-install to fix maintenance:install error
      # - NEXTCLOUD_ADMIN_USER=admin
      # - NEXTCLOUD_ADMIN_PASSWORD=adminpassword

      # Dynamic trusted domains - will be updated by init container
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost host.docker.internal

      # Use host.docker.internal for dynamic Windows IP resolution
      - OVERWRITEPROTOCOL=http

      # PHP Configuration
      - PHP_MEMORY_LIMIT=1G
      - PHP_UPLOAD_LIMIT=10G
      - PHP_MAX_FILE_UPLOADS=100

      # Network optimizations
      - APACHE_DISABLE_REWRITE_IP=1
      - TRUSTED_PROXIES=172.0.0.0/8 192.168.0.0/16 10.0.0.0/8 host.docker.internal  192.168.1.98

      # Force clean installation
      - NEXTCLOUD_INIT_HTACCESS=true
      - SQLITE_DATABASE=""

    depends_on:
      ip-config-init:
        condition: service_completed_successfully
      nextcloud-db:
        condition: service_healthy
    networks:
      - nextcloud-network

networks:
  nextcloud-network:
    driver: bridge