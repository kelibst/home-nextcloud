# docker compose .yml - Uses dynamic IP detection

services:
  nextcloud-db:
    image: postgres:13-alpine
    container_name: nextcloud-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloudpassword
      - PGDATA=/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud -d nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextcloud-network

  redis:
    image: redis:alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    command: redis-server --requirepass redispassword
    networks:
      - nextcloud-network

  nextcloud-app:
    image: nextcloud:latest
    container_name: nextcloud-app
    restart: unless-stopped
    ports:
      # Bind to all interfaces for external access
      - "8090:80"
    volumes:
      - nextcloud_config:/var/www/html/config
      - nextcloud_data:/var/www/html/data
      - nextcloud_custom_apps:/var/www/html/custom_apps
      - nextcloud_themes:/var/www/html/themes
      - ${SHARED_DRIVE_PATH}:/mnt/external-storage:rw
    environment:
      # PostgreSQL Configuration
      - POSTGRES_HOST=nextcloud-db
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloudpassword
      
      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_HOST_PASSWORD=redispassword
      
      # Nextcloud Configuration
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=adminpassword
      
      # Dynamic trusted domains - will be updated by script
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost 192.168.1.1 192.168.1.98 host.docker.internal
      
      # Use host.docker.internal for dynamic Windows IP resolution
      - OVERWRITEPROTOCOL=http
      
      # PHP Configuration
      - PHP_MEMORY_LIMIT=1G
      - PHP_UPLOAD_LIMIT=10G
      - PHP_MAX_FILE_UPLOADS=100
      
      # Network optimizations
      - APACHE_DISABLE_REWRITE_IP=1
      - TRUSTED_PROXIES=172.0.0.0/8 192.168.0.0/16 10.0.0.0/8 host.docker.internal 192.168.1.98

      # External Storage Configuration
      - EXTERNAL_STORAGE_NAME=${EXTERNAL_STORAGE_NAME}
      - EXTERNAL_STORAGE_MOUNT_PATH=${EXTERNAL_STORAGE_MOUNT_PATH}
      - EXTERNAL_STORAGE_FOLDER_NAME=${EXTERNAL_STORAGE_FOLDER_NAME}
      - EXTERNAL_STORAGE_USERS=${EXTERNAL_STORAGE_USERS}
      
    depends_on:
      nextcloud-db:
        condition: service_healthy
    networks:
      - nextcloud-network

networks:
  nextcloud-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  nextcloud_config:
    driver: local
  nextcloud_data:
    driver: local
  nextcloud_custom_apps:
    driver: local
  nextcloud_themes:
    driver: local